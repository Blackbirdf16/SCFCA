stages:
  - validate
  - test
  - build
  - security
  - dast

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  # These commonly fail unless the registry/image/target URL are set up.
  # Keep them disabled by default; you can re-enable later when the pipeline is wired.
  - template: Security/Container-Scanning.gitlab-ci.yml
  - template: Security/DAST.gitlab-ci.yml

variables:
  BACKEND_IMAGE: "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA"
  FRONTEND_IMAGE: "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA"
  DAST_TARGET_URL: ""

  # Disable these by default to keep pipelines green on shared runners
  # until images/targets are fully configured.
  CONTAINER_SCANNING_DISABLED: "true"
  DAST_DISABLED: "true"

  # Docker-in-Docker defaults
  DOCKER_DRIVER: overlay2

# Default Docker image for jobs that need Docker. Language-specific jobs override this.
image: docker:24.0.2
services:
  - name: docker:24.0.2-dind

# ---------------------
# validate
# ---------------------
validate:
  stage: validate
  image: python:3.11-slim
  rules:
    - when: always
  script:
    - python --version
    - pip --version
    - |
      if [ -f backend/requirements.txt ]; then
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
      else
        echo "No backend/requirements.txt found; skipping"
      fi

# ---------------------
# test
# ---------------------
backend-tests:
  stage: test
  image: python:3.11-slim
  variables:
    PIP_DISABLE_PIP_VERSION_CHECK: "1"
    DATABASE_URL: "postgresql://scfca:scfca@postgres:5432/scfca_test"
    SECRET_KEY: "test_secret_key_at_least_32_characters_long"
  services:
    - name: postgres:16-alpine
      alias: postgres
      variables:
        POSTGRES_USER: scfca
        POSTGRES_PASSWORD: scfca
        POSTGRES_DB: scfca_test
  before_script:
    - python -m pip install --upgrade pip
    - pip install pytest pytest-cov
    - if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
  script:
    - mkdir -p reports
    - pytest tests/ --junitxml=reports/junit.xml --cov=backend -q
  artifacts:
    when: always
    paths:
      - reports/
    expire_in: 1 week
    reports:
      junit: reports/junit.xml
  rules:
    - exists:
        - tests/
      when: always
    - when: never

frontend-typecheck:
  stage: test
  image: node:18-alpine
  before_script:
    - apk add --no-cache git
    - cd frontend
    - npm ci --silent
  script:
    - npm run typecheck
  rules:
    - exists:
        - frontend/package.json
      when: manual
    - when: never

# ---------------------
# build
# ---------------------
build-backend:
  stage: build
  image: docker:24.0.2
  services:
    - docker:24.0.2-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -t "$BACKEND_IMAGE" -f backend/Dockerfile .
    - |
      if [ -n "$CI_REGISTRY" ] && [ -n "$CI_REGISTRY_USER" ]; then
        echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
        docker push "$BACKEND_IMAGE" || true
      else
        echo "No registry configured; skipping push"
      fi
  rules:
    - exists:
        - backend/Dockerfile
      when: always
    - when: never

build-frontend:
  stage: build
  image: docker:24.0.2
  services:
    - docker:24.0.2-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -t "$FRONTEND_IMAGE" -f frontend/Dockerfile .
    - |
      if [ -n "$CI_REGISTRY" ] && [ -n "$CI_REGISTRY_USER" ]; then
        echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
        docker push "$FRONTEND_IMAGE" || true
      else
        echo "No registry configured; skipping push"
      fi
  rules:
    - exists:
        - frontend/Dockerfile
      when: always
    - when: never

# ---------------------
# dast
# ---------------------
# If/when you want DAST, set these CI variables:
# - DAST_DISABLED=false
# - DAST_TARGET_URL=https://<your-deployed-app>
dast:
  stage: dast
  variables:
    DAST_WEBSITE: "$DAST_TARGET_URL"
  rules:
    - if: '$DAST_TARGET_URL != "" && $DAST_DISABLED != "true"'
      when: manual
    - when: never
  allow_failure: true
