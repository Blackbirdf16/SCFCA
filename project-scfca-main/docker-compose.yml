services:
  postgres:
    image: postgres:16-alpine
    container_name: scfca-postgres
    environment:
      POSTGRES_USER: scfca
      POSTGRES_PASSWORD: scfca
      POSTGRES_DB: scfca
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scfca"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: scfca-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - SECRET_KEY=${SCFCA_SECRET_KEY:-change_this_secret_to_a_32_char_minimum}
      - DATABASE_URL=postgresql://scfca:scfca@postgres:5432/scfca
    volumes:
      - ./backend:/app/backend:delegated
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: scfca-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
