version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: scfca-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app:delegated
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: scfca-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    # For production-like runs we do not mount source. For dev use:
    # docker-compose run --service-ports frontend npm run dev
    # For development you can override command to `npm run dev` with `docker-compose run --service-ports frontend npm run dev`

# Useful commands in README:
# docker-compose up --build
# docker-compose up --build -d
# docker-compose run --service-ports frontend npm run dev
